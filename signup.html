<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Friendster</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: Tahoma, Arial; 
            background: #8eb1e7; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box { 
            background: white; 
            padding: 20px; 
            width: 100%;
            max-width: 350px; 
            border: 2px solid #4b6c9e;
            border-radius: 8px;
        }
        h2 { color: #0d5ba5; margin: 0 0 15px 0; text-align: center; }
        input { 
            width: 100%; 
            margin: 8px 0; 
            padding: 12px; 
            border: 1px solid #999;
            border-radius: 4px;
            font-size: 16px;
        }
        button { 
            background: #6d8ec7; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:active { background: #4b6c9e; }
        a { color: #0d5ba5; text-decoration: none; display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Join Friendster</h2>
        <input id="username" placeholder="Username" autocomplete="off">
        <input id="password" type="password" placeholder="Password">
        <button onclick="signup()">Create Account</button>
        <a href="login.html">Already have account? Login</a>
    </div>

<script>
    const gun = Gun({
        peers: ['https://gun-manhattan.herokuapp.com/gun'],
        localStorage: true
    });
    const users = gun.get('friendster_users');
    
    function signup() {
        const username = document.getElementById('username').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        
        if(!username || !password) return alert('Fill all fields');
        if(username.length < 3) return alert('Username must be 3+ characters');
        
        users.get(username).once(data => {
            if(data) return alert('Username taken na');
            
            users.get(username).put({
                username: username,
                password: password,
                profilePic: 'https://i.imgur.com/8Km9tLL.png',
                aboutMe: 'New Friendster user!',
                mood: 'Happy 😊',
                joined: Date.now()
            });
            
            localStorage.setItem('friendster_user', username);
            window.location.href = 'profile.html?user=' + username;
        });
    }
</script>
</body>
</html>
