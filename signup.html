<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join App</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #3b0764); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px 30px; width: 100%; max-width: 400px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-weight: 800; font-size: 2.5rem; margin: 0 0 10px 0; background: -webkit-linear-gradient(#a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 30px; }
        input { width: 100%; margin: 10px 0; padding: 18px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: #ec4899; }
        button { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; border: none; padding: 18px; width: 100%; font-size: 1.1rem; font-weight: 600; border-radius: 16px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4); }
        button:active { transform: scale(0.98); }
        a { color: #a855f7; text-decoration: none; display: block; margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Vibe.</h1>
        <p>Join the aesthetic network.</p>
        <input id="username" placeholder="Choose a username" autocomplete="off">
        <input id="password" type="password" placeholder="Create a password">
        <button onclick="signup()">Enter</button>
        <a href="login.html">Already in? Login here.</a>
    </div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const users = gun.get('friendster_users');
    
    function signup() {
        const username = document.getElementById('username').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        if(!username || !password) return alert('Fill everything up!');
        if(username.length < 3) return alert('Username too short.');
        
        users.get(username).once(data => {
            if(data) return alert('Username taken 💀');
            users.get(username).put({
                username: username,
                password: password,
                profilePic: 'https://i.imgur.com/8Km9tLL.png',
                aboutMe: 'Just vibing ✨',
                mood: 'Happy 😊',
                joined: Date.now()
            });
            localStorage.setItem('friendster_user', username);
            window.location.href = 'profile.html?user=' + username;
        });
    }
</script>
</body>
</html>
