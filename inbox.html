<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Friendster</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #8eb1e7; font-family: Tahoma; font-size: 14px; margin: 0; }
       .header { background: #0d5ba5; color: white; padding: 10px; position: sticky; top: 0; }
       .header a { color: yellow; text-decoration: none; margin: 0 8px; }
       .container { width: 100%; max-width: 900px; margin: 10px auto; background: white; padding: 15px; border-radius: 8px; }
       .section-title { background: #6d8ec7; color: white; padding: 8px; font-weight: bold; margin: 10px 0; border-radius: 4px; }
       .chat-user {
            padding: 12px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
       .chat-user:active { background: #e8f0fb; }
       .chat-user img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
       .chat-info { flex: 1; }
       .chat-name { font-weight: bold; font-size: 16px; }
       .chat-preview { color: #666; font-size: 12px; }
        @media (max-width: 600px) {
           .header a { font-size: 12px; margin: 0 4px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <b>friendster</b> |
        <a href="profile.html" id="my-profile">Profile</a> |
        <a href="friends.html">Friends</a> |
        <a href="inbox.html">Messages</a>
    </div>
    <div class="container">
        <div class="section-title">Your Conversations</div>
        <div id="inbox-list">Loading conversations...</div>
    </div>

<script>
    const gun = Gun({
        peers: ['https://gun-manhattan.herokuapp.com/gun'],
        localStorage: true
    });
    const users = gun.get('friendster_users');
    const myUser = localStorage.getItem('friendster_user');

    if(!myUser) window.location.href = 'login.html';
    document.getElementById('my-profile').href = 'profile.html?user=' + myUser;

    users.get(myUser).get('inbox').map().once((data, chatUser) => {
        if(!data) return;

        users.get(chatUser).once(userData => {
            const chatID = [myUser, chatUser].sort().join('_');
            const chat = gun.get('friendster_chats').get(chatID);

            // Get last message
            chat.map().once((msgData) => {
                if(!msgData) return;
                document.getElementById('inbox-list').innerHTML = '';

                users.get(myUser).get('inbox').map().once((d, user) => {
                    users.get(user).once(uData => {
                        const chatBox = document.createElement('div');
                        chatBox.className = 'chat-user';
                        chatBox.onclick = () => window.location.href = 'message.html?user=' + user;
                        chatBox.innerHTML = `
                            <img src="${uData.profilePic}">
                            <div class="chat-info">
                                <div class="chat-name">${user}</div>
                                <div class="chat-preview">Tap to open chat</div>
                            </div>
                        `;
                        document.getElementById('inbox-list').appendChild(chatBox);
                    });
                });
            });
        });
    });

    setTimeout(() => {
        if(document.getElementById('inbox-list').innerHTML === 'Loading conversations...') {
            document.getElementById('inbox-list').innerHTML = 'No conversations yet. Message a friend to start!';
        }
    }, 2000);
</script>
</body>
</html>
