<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #0f172a; /* Fallback */
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #fff; margin: 0; padding-bottom: 80px; min-height: 100vh;
        }
        
        /* ALL TRANSPARENT GLASSMORPHISM */
        .glass-box {
            background: rgba(0, 0, 0, 0.3); /* highly transparent to see BG */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; backdrop-filter: blur(5px); font-weight: 600; cursor: pointer; }
        
        .container { padding: 0 15px; max-width: 600px; margin: 0 auto; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .profile-header { text-align: center; margin-top: 20px; }
        .profile-header img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.5); object-fit: cover; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { margin: 10px 0 5px 0; font-size: 1.8rem; }
        .status { color: #e2e8f0; font-size: 0.9rem; margin-bottom: 15px; }
        
        .btn { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; border: none; padding: 12px 0; width: 48%; border-radius: 12px; font-weight: 600; cursor: pointer; display: inline-block; text-align: center; text-decoration: none; }
        .action-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .section-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 0 20px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .bottom-nav a { color: rgba(255,255,255,0.6); text-decoration: none; text-align: center; font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; text-shadow: none; }
        .bottom-nav a.active { color: #fff; }
        .bottom-nav i { font-size: 1.5rem; font-style: normal; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight: 700; font-size: 1.2rem; text-shadow: 0 2px 5px rgba(0,0,0,0.8);">@<span id="username-nav">...</span></div>
        <div>
            <button onclick="location.href='settings.html'" id="edit-btn" style="display:none;">Edit</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="profile-header glass-box">
            <img id="profile-pic" src="https://i.imgur.com/8Km9tLL.png">
            <h1 id="username">Loading...</h1>
            <div class="status" id="status-text">...</div>
            
            <div class="action-row" id="actions">
                <a id="message-btn" class="btn">Message</a>
                <button id="add-friend-btn" class="btn">Add Friend</button>
            </div>
        </div>

        <div class="glass-box">
            <div class="section-title">Vibe Check (Mood)</div>
            <div id="mood">...</div>
        </div>

        <div class="glass-box">
            <div class="section-title">About Me</div>
            <div id="about-me">...</div>
        </div>
    </div>

    <audio id="bg-music" loop></audio>

    <nav class="bottom-nav">
        <a href="index.html"><i>🏠</i>Home</a>
        <a href="friends.html"><i>👥</i>Friends</a>
        <a href="inbox.html"><i>💬</i>Chats</a>
        <a href="profile.html" id="my-profile" class="active"><i>👤</i>Profile</a>
    </nav>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const users = gun.get('friendster_users');
    const urlParams = new URLSearchParams(window.location.search);
    const profileUser = urlParams.get('user');
    const myUser = localStorage.getItem('friendster_user');
    
    if(!profileUser) window.location.href = 'index.html';
    if(!myUser) window.location.href = 'login.html';
    
    document.getElementById('my-profile').href = 'profile.html?user=' + myUser;
    document.getElementById('message-btn').href = 'message.html?user=' + profileUser;
    
    if(profileUser === myUser) {
        document.getElementById('actions').style.display = 'none';
        document.getElementById('edit-btn').style.display = 'inline-block';
    }
    
    users.get(profileUser).on(data => {
        if(!data) return;
        document.getElementById('username').innerText = data.username;
        document.getElementById('username-nav').innerText = data.username;
        document.getElementById('profile-pic').src = data.profilePic || 'https://i.imgur.com/8Km9tLL.png';
        document.getElementById('mood').innerText = data.mood || 'Just vibing ✨';
        document.getElementById('about-me').innerText = data.aboutMe || 'Mysterious...';
        document.getElementById('status-text').innerText = data.status || 'Active now';
        
        // This is what makes the whole app background dynamic and transparent
        if(data.backgroundUrl) document.body.style.backgroundImage = `url('${data.backgroundUrl}')`;
        if(data.musicUrl) document.getElementById('bg-music').src = data.musicUrl;
    });
    
    document.getElementById('add-friend-btn').onclick = () => {
        users.get(profileUser).get('requests').get(myUser).put(true);
        users.get(myUser).get('sent_requests').get(profileUser).put(true);
        alert('Friend request sent! 🚀');
    };
    
    function logout() {
        localStorage.removeItem('friendster_user');
        window.location.href = 'login.html';
    }
    
    document.body.onclick = () => document.getElementById('bg-music').play().catch(e => {});
</script>
</body>
</html>
