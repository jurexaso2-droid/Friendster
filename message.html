<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Friendster</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #8eb1e7; font-family: Tahoma; font-size: 14px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
       .header { background: #0d5ba5; color: white; padding: 10px; flex-shrink: 0; }
       .header a { color: yellow; text-decoration: none; }
       .chat-container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
        }
       .chat-header {
            background: #6d8ec7;
            color: white;
            padding: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
       .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f5f5f5;
        }
       .msg {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            clear: both;
        }
       .msg-me {
            background: #6d8ec7;
            color: white;
            float: right;
            border-bottom-right-radius: 4px;
        }
       .msg-them {
            background: #e8e8e8;
            float: left;
            border-bottom-left-radius: 4px;
        }
       .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
       .input-area {
            padding: 10px;
            background: white;
            border-top: 1px solid #ccc;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        #new-msg {
            flex: 1;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 20px;
            font-size: 16px;
        }
       .send-btn {
            background: #6d8ec7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
       .send-btn:active { background: #4b6c9e; }
    </style>
</head>
<body>
    <div class="header">
        <a href="inbox.html">< Back</a> |
        <a href="profile.html" id="my-profile">My Profile</a>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <img id="chat-pic" src="https://i.imgur.com/8Km9tLL.png">
            <span id="chat-with">Loading...</span>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="new-msg" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button class="send-btn" onclick="sendMsg()">Send</button>
        </div>
    </div>

<script>
    const gun = Gun({
        peers: ['https://gun-manhattan.herokuapp.com/gun'],
        localStorage: true
    });
    const users = gun.get('friendster_users');

    const urlParams = new URLSearchParams(window.location.search);
    const chatUser = urlParams.get('user');
    const myUser = localStorage.getItem('friendster_user');

    if(!myUser) window.location.href = 'login.html';
    if(!chatUser) window.location.href = 'inbox.html';

    document.getElementById('my-profile').href = 'profile.html?user=' + myUser;
    document.getElementById('chat-with').innerText = chatUser;

    // Load chat user pic
    users.get(chatUser).once(data => {
        if(data && data.profilePic) document.getElementById('chat-pic').src = data.profilePic;
    });

    const chatID = [myUser, chatUser].sort().join('_');
    const chat = gun.get('friendster_chats').get(chatID);

    function sendMsg() {
        const text = document.getElementById('new-msg').value.trim();
        if(!text) return;

        chat.set({
            from: myUser,
            to: chatUser,
            text: text,
            time: Date.now()
        });
        document.getElementById('new-msg').value = '';

        users.get(myUser).get('inbox').get(chatUser).put(true);
        users.get(chatUser).get('inbox').get(myUser).put(true);
    }

    const rendered = {};
    chat.map().on((data, id) => {
        if(!data || rendered[id]) return;
        rendered[id] = true;

        const div = document.createElement('div');
        div.className = 'msg ' + (data.from === myUser? 'msg-me' : 'msg-them');
        div.innerHTML = `
            ${data.text}
            <div class="msg-time">${new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
        `;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = 999999;
    });
</script>
</body>
</html>
