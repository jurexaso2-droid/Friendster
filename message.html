<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f172a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white;}
        .chat-header { background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;}
        .back-btn { color: #a855f7; text-decoration: none; font-size: 1.5rem; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-header span { font-weight: 600; font-size: 1.2rem; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; word-wrap: break-word; font-size: 0.95rem; }
        .msg-me { align-self: flex-end; background: linear-gradient(135deg, #a855f7, #ec4899); border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .msg-time { font-size: 0.65rem; opacity: 0.7; margin-top: 5px; text-align: right; }
        
        .input-area { padding: 15px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; padding-bottom: 25px; }
        input { flex: 1; padding: 15px 20px; background: rgba(255,255,255,0.1); border: none; border-radius: 30px; color: white; outline: none; }
        .send-btn { background: #a855f7; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="inbox.html" class="back-btn">←</a>
        <img id="chat-pic" src="https://i.imgur.com/8Km9tLL.png">
        <span id="chat-with">...</span>
    </div>
    
    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="new-msg" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const users = gun.get('friendster_users');
    const urlParams = new URLSearchParams(window.location.search);
    const chatUser = urlParams.get('user');
    const myUser = localStorage.getItem('friendster_user');

    if(!myUser) window.location.href = 'login.html';
    if(!chatUser) window.location.href = 'inbox.html';

    document.getElementById('chat-with').innerText = chatUser;
    users.get(chatUser).once(data => { if(data && data.profilePic) document.getElementById('chat-pic').src = data.profilePic; });

    const chatID = [myUser, chatUser].sort().join('_');
    const chat = gun.get('friendster_chats').get(chatID);

    function sendMsg() {
        const text = document.getElementById('new-msg').value.trim();
        if(!text) return;
        chat.set({ from: myUser, to: chatUser, text: text, time: Date.now() });
        document.getElementById('new-msg').value = '';
        users.get(myUser).get('inbox').get(chatUser).put(true);
        users.get(chatUser).get('inbox').get(myUser).put(true);
    }

    const rendered = {};
    chat.map().on((data, id) => {
        if(!data || rendered[id]) return;
        rendered[id] = true;
        const div = document.createElement('div');
        div.className = 'msg ' + (data.from === myUser ? 'msg-me' : 'msg-them');
        div.innerHTML = `${data.text}<div class="msg-time">${new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = 999999;
    });
</script>
</body>
</html>
