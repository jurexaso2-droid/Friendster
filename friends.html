<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #8eb1e7; font-family: Tahoma; font-size: 14px; margin: 0; }
        .header { background: #0d5ba5; color: white; padding: 10px; position: sticky; top: 0; }
        .header a { color: yellow; text-decoration: none; margin: 0 8px; }
        .container { width: 100%; max-width: 900px; margin: 10px auto; background: white; padding: 15px; border-radius: 8px; }
        .section-title { background: #6d8ec7; color: white; padding: 8px; font-weight: bold; margin: 15px 0 8px 0; border-radius: 4px; }
        .user-box { 
            border: 1px solid #a8c0e3; 
            padding: 10px; 
            margin: 8px 0; 
            background: #e8f0fb;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-box img { width: 60px; height: 60px; border: 1px solid #666; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .user-info { flex: 1; }
        .btn { 
            background: #6d8ec7; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            cursor: pointer; 
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
        }
        .btn-red { background: #c76d6d; }
        .btn-green { background: #6dc78d; }
        #search-box { width: 100%; padding: 12px; border: 1px solid #999; border-radius: 4px; font-size: 16px; }
        @media (max-width: 600px) {
            .user-box { flex-wrap: wrap; }
            .btn { flex: 1 1 auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <b>friendster</b> | 
        <a href="profile.html" id="my-profile">Profile</a> | 
        <a href="friends.html">Friends</a> | 
        <a href="inbox.html">Messages</a>
    </div>
    
    <div class="container">
        <div class="section-title">Search Users</div>
        <input type="text" id="search-box" placeholder="Type username..." onkeyup="searchUsers()">
        <div id="search-results"></div>
        
        <div class="section-title">Friend Requests (<span id="req-count">0</span>)</div>
        <div id="friend-requests">No pending requests</div>
        
        <div class="section-title">My Friends (<span id="friend-count">0</span>)</div>
        <div id="friend-list">You have no friends yet 😢</div>
    </div>

<script>
    const gun = Gun({
        peers: ['https://gun-manhattan.herokuapp.com/gun'],
        localStorage: true
    });
    const users = gun.get('friendster_users');
    const myUser = localStorage.getItem('friendster_user');
    
    if(!myUser) window.location.href = 'signup.html';
    document.getElementById('my-profile').href = 'profile.html?user=' + myUser;
    
    users.get(myUser).get('requests').map().on((data, fromUser) => {
        renderRequests();
    });
    
    users.get(myUser).get('friends').map().on((data, friendUser) => {
        renderFriends();
    });
    
    function renderRequests() {
        document.getElementById('friend-requests').innerHTML = '';
        let count = 0;
        users.get(myUser).get('requests').map().once((data, fromUser) => {
            if(!data) return;
            count++;
            users.get(fromUser).once(userData => {
                document.getElementById('friend-requests').innerHTML += `
                    <div class="user-box">
                        <img src="${userData.profilePic}">
                        <div class="user-info">
                            <b><a href="profile.html?user=${fromUser}">${fromUser}</a></b><br>
                            <small>Wants to be friends</small>
                        </div>
                        <button class="btn btn-green" onclick="acceptFriend('${fromUser}')">Accept</button>
                        <button class="btn btn-red" onclick="rejectFriend('${fromUser}')">Reject</button>
                    </div>
                `;
            });
        });
        setTimeout(() => {
            document.getElementById('req-count').innerText = count;
            if(count === 0) document.getElementById('friend-requests').innerHTML = 'No pending requests';
        }, 500);
    }
    
    function renderFriends() {
        document.getElementById('friend-list').innerHTML = '';
        let count = 0;
        users.get(myUser).get('friends').map().once((data, friendUser) => {
            if(!data) return;
            count++;
            users.get(friendUser).once(userData => {
                document.getElementById('friend-list').innerHTML += `
                    <div class="user-box">
                        <img src="${userData.profilePic}">
                        <div class="user-info">
                            <b><a href="profile.html?user=${friendUser}">${friendUser}</a></b><br>
                            <small>${userData.mood || 'No mood'}</small>
                        </div>
                        <button class="btn" onclick="location.href='message.html?user=${friendUser}'">Message</button>
                        <button class="btn btn-red" onclick="removeFriend('${friendUser}')">Unfriend</button>
                    </div>
                `;
            });
        });
        setTimeout(() => {
            document.getElementById('friend-count').innerText = count;
            if(count === 0) document.getElementById('friend-list').innerHTML = 'You have no friends yet 😢';
        }, 500);
    }
    
    function searchUsers() {
        const query = document.getElementById('search-box').value.toLowerCase().trim();
        const resultsDiv = document.getElementById('search-results');
        if(query.length < 2) return resultsDiv.innerHTML = '';
        
        resultsDiv.innerHTML = '';
        users.map().once((data, username) => {
            if(username.includes(query) && username !== myUser) {
                users.get(myUser).get('friends').get(username).once(isFriend => {
                    let btnText = isFriend ? 'Friends' : 'Add Friend';
                    let disabled = isFriend ? 'disabled' : '';
                    let action = isFriend ? '' : `onclick="sendRequest('${username}')"`;
                    
                    resultsDiv.innerHTML += `
                        <div class="user-box">
                            <img src="${data.profilePic}">
                            <div class="user-info">
                                <b><a href="profile.html?user=${username}">${username}</a></b>
                            </div>
                            <button class="btn" ${action} ${disabled}>${btnText}</button>
                        </div>
                    `;
                });
            }
        });
    }
    
    function sendRequest(toUser) {
        users.get(toUser).get('requests').get(myUser).put(true);
        users.get(myUser).get('sent_requests').get(toUser).put(true);
        alert('Friend request sent!');
        searchUsers();
    }
    
    function acceptFriend(fromUser) {
        users.get(myUser).get('friends').get(fromUser).put(true);
        users.get(fromUser).get('friends').get(myUser).put(true);
        users.get(myUser).get('requests').get(fromUser).put(null);
        users.get(fromUser).get('sent_requests').get(myUser).put(null);
    }
    
    function rejectFriend(fromUser) {
        users.get(myUser).get('requests').get(fromUser).put(null);
        users.get(fromUser).get('sent_requests').get(myUser).put(null);
    }
    
    function removeFriend(friendUser) {
        if(!confirm('Unfriend ' + friendUser + '?')) return;
        users.get(myUser).get('friends').get(friendUser).put(null);
        users.get(friendUser).get('friends').get(myUser).put(null);
    }
    
    renderRequests();
    renderFriends();
</script>
</body>
</html>
