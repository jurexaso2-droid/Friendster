<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friends</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background: #0f172a; color: #f8fafc; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; font-weight: 700; font-size: 1.5rem; position: sticky; top:0; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); z-index: 10;}
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        .search-box { width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: none; border-radius: 16px; color: white; font-size: 1rem; margin-bottom: 20px; outline: none;}
        .search-box:focus { background: rgba(255,255,255,0.15); border: 1px solid #a855f7; }
        
        .section-title { font-weight: 600; color: #a855f7; margin: 20px 0 10px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        
        .user-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .user-box img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #334155; }
        .user-info { flex: 1; }
        .user-info a { color: white; text-decoration: none; font-weight: 600; font-size: 1rem; display: block; }
        .user-info small { color: #94a3b8; font-size: 0.75rem; }
        
        .btn { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #ec4899); }
        .btn-danger { background: #ef4444; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 10px 0 20px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .bottom-nav a { color: #94a3b8; text-decoration: none; text-align: center; font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
        .bottom-nav a.active { color: #ec4899; }
        .bottom-nav i { font-size: 1.5rem; font-style: normal; }
    </style>
</head>
<body>
    <div class="header">Discover 🌍</div>
    
    <div class="container">
        <input type="text" class="search-box" id="search-box" placeholder="Search friends..." onkeyup="searchUsers()">
        <div id="search-results"></div>
        
        <div class="section-title">Friend Requests (<span id="req-count">0</span>)</div>
        <div id="friend-requests" style="color:#94a3b8; font-size:0.9rem;">Clean! No requests.</div>
        
        <div class="section-title">My Squad (<span id="friend-count">0</span>)</div>
        <div id="friend-list" style="color:#94a3b8; font-size:0.9rem;">No friends yet 😢</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><i>🏠</i>Home</a>
        <a href="friends.html" class="active"><i>👥</i>Friends</a>
        <a href="inbox.html"><i>💬</i>Chats</a>
        <a href="profile.html" id="my-profile"><i>👤</i>Profile</a>
    </nav>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const users = gun.get('friendster_users');
    const myUser = localStorage.getItem('friendster_user');
    
    if(!myUser) window.location.href = 'login.html';
    document.getElementById('my-profile').href = 'profile.html?user=' + myUser;
    
    users.get(myUser).get('requests').map().on(() => renderRequests());
    users.get(myUser).get('friends').map().on(() => renderFriends());
    
    function renderRequests() {
        document.getElementById('friend-requests').innerHTML = '';
        let count = 0;
        users.get(myUser).get('requests').map().once((data, fromUser) => {
            if(!data) return;
            count++;
            users.get(fromUser).once(userData => {
                document.getElementById('friend-requests').innerHTML += `
                    <div class="user-box">
                        <img src="${userData.profilePic || 'https://i.imgur.com/8Km9tLL.png'}">
                        <div class="user-info">
                            <a href="profile.html?user=${fromUser}">${fromUser}</a>
                            <small>Wants to connect</small>
                        </div>
                        <button class="btn btn-primary" onclick="acceptFriend('${fromUser}')">Add</button>
                    </div>
                `;
            });
        });
        setTimeout(() => document.getElementById('req-count').innerText = count, 500);
    }
    
    function renderFriends() {
        document.getElementById('friend-list').innerHTML = '';
        let count = 0;
        users.get(myUser).get('friends').map().once((data, friendUser) => {
            if(!data) return;
            count++;
            users.get(friendUser).once(userData => {
                document.getElementById('friend-list').innerHTML += `
                    <div class="user-box">
                        <img src="${userData.profilePic || 'https://i.imgur.com/8Km9tLL.png'}">
                        <div class="user-info">
                            <a href="profile.html?user=${friendUser}">${friendUser}</a>
                            <small>${userData.mood || 'Vibing'}</small>
                        </div>
                        <button class="btn btn-primary" onclick="location.href='message.html?user=${friendUser}'">Chat</button>
                    </div>
                `;
            });
        });
        setTimeout(() => document.getElementById('friend-count').innerText = count, 500);
    }

    function searchUsers() {
        const query = document.getElementById('search-box').value.toLowerCase().trim();
        const resultsDiv = document.getElementById('search-results');
        if(query.length < 2) return resultsDiv.innerHTML = '';
        
        resultsDiv.innerHTML = '<div class="section-title">Results</div>';
        users.map().once((data, username) => {
            if(username.includes(query) && username !== myUser) {
                users.get(myUser).get('friends').get(username).once(isFriend => {
                    let btnHTML = isFriend ? '<button class="btn">Friends</button>' : `<button class="btn btn-primary" onclick="sendRequest('${username}')">Add</button>`;
                    resultsDiv.innerHTML += `
                        <div class="user-box">
                            <img src="${data.profilePic || 'https://i.imgur.com/8Km9tLL.png'}">
                            <div class="user-info"><a href="profile.html?user=${username}">${username}</a></div>
                            ${btnHTML}
                        </div>
                    `;
                });
            }
        });
    }

    function sendRequest(toUser) {
        users.get(toUser).get('requests').get(myUser).put(true);
        users.get(myUser).get('sent_requests').get(toUser).put(true);
        alert('Request sent! 🚀');
        searchUsers();
    }
    function acceptFriend(fromUser) {
        users.get(myUser).get('friends').get(fromUser).put(true);
        users.get(fromUser).get('friends').get(myUser).put(true);
        users.get(myUser).get('requests').get(fromUser).put(null);
    }
    renderRequests();
    renderFriends();
</script>
</body>
</html>
