<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Friendster</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Tahoma; font-size: 14px; padding: 15px; background: #e8f0fb; margin: 0; }
       .header { background: #0d5ba5; color: white; padding: 10px; margin: -15px -15px 15px -15px; }
       .header a { color: yellow; text-decoration: none; }
       .box { background: white; padding: 15px; border: 1px solid #4b6c9e; margin: 10px 0; border-radius: 8px; }
        h3 { color: #0d5ba5; margin: 10px 0 5px 0; font-size: 16px; }
        input, textarea {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 4px;
            font-size: 16px;
            font-family: Tahoma;
        }
        button {
            background: #6d8ec7;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 5px;
        }
        button:active { background: #4b6c9e; }
        small { color: #666; font-size: 11px; }
       .preview { width: 100px; height: 100px; object-fit: cover; border: 2px solid #4b6c9e; border-radius: 4px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="header">
        <a href="profile.html" id="back-profile"><< Back to Profile</a>
    </div>

    <h2>Edit Profile</h2>

    <div class="box">
        <h3>Profile Picture URL</h3>
        <img id="pic-preview" class="preview" src="https://i.imgur.com/8Km9tLL.png">
        <input type="text" id="pic-url" placeholder="https://i.imgur.com/example.jpg">
        <button onclick="savePic()">Save Picture</button>
        <small>Use Imgur or any direct image URL</small>

        <h3>Background Image URL</h3>
        <input type="text" id="bg-url" placeholder="https://i.imgur.com/bg.gif">
        <button onclick="saveBg()">Save Background</button>

        <h3>Profile Song URL</h3>
        <input type="text" id="music-url" placeholder="https://example.com/song.mp3">
        <button onclick="saveMusic()">Save Music</button>
        <small>MP3 URL. May not autoplay on mobile</small>

        <h3>Status/Marquee Text</h3>
        <input type="text" id="status" placeholder="What's on your mind?">
        <button onclick="saveStatus()">Save Status</button>

        <h3>About Me</h3>
        <textarea id="about-me" rows="4" placeholder="Tell us about yourself..."></textarea>
        <button onclick="saveAbout()">Save About Me</button>

        <h3>Mood</h3>
        <input type="text" id="mood" placeholder="In love ♥">
        <button onclick="saveMood()">Save Mood</button>
    </div>

<script>
    const gun = Gun({
        peers: ['https://gun-manhattan.herokuapp.com/gun'],
        localStorage: true
    });
    const myUser = localStorage.getItem('friendster_user');
    if(!myUser) window.location.href = 'login.html';

    const user = gun.get('friendster_users').get(myUser);
    document.getElementById('back-profile').href = 'profile.html?user=' + myUser;

    function savePic() {
        const url = document.getElementById('pic-url').value;
        user.get('profilePic').put(url);
        alert('Profile pic updated!');
    }
    function saveBg() {
        user.get('backgroundUrl').put(document.getElementById('bg-url').value);
        alert('Background updated!');
    }
    function saveMusic() {
        user.get('musicUrl').put(document.getElementById('music-url').value);
        alert('Music updated! Click profile to play');
    }
    function saveStatus() {
        user.get('status').put(document.getElementById('status').value);
        alert('Status updated!');
    }
    function saveAbout() {
        user.get('aboutMe').put(document.getElementById('about-me').value);
        alert('About me updated!');
    }
    function saveMood() {
        user.get('mood').put(document.getElementById('mood').value);
        alert('Mood updated!');
    }

    // Load current values
    user.on(data => {
        if(!data) return;
        document.getElementById('pic-url').value = data.profilePic || '';
        document.getElementById('pic-preview').src = data.profilePic || 'https://i.imgur.com/8Km9tLL.png';
        document.getElementById('bg-url').value = data.backgroundUrl || '';
        document.getElementById('music-url').value = data.musicUrl || '';
        document.getElementById('status').value = data.status || '';
        document.getElementById('about-me').value = data.aboutMe || '';
        document.getElementById('mood').value = data.mood || '';
    });
</script>
</body>
</html>
